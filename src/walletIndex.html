<?php

// This file accepts incoming messages from the eIOU network
require_once("/etc/eiou/functions.php");

if (!file_exists("/etc/eiou/config.php")) {
  echo "eIOU has not yet been initiated. Please run from terminal to initialize the system.";
  die;
}
require_once("/etc/eiou/config.php");

// Include session management
require_once("/etc/eiou/src/gui/includes/session.php");

// Start secure session
startSecureSession();

// Handle logout request
if (isset($_GET['logout'])) {
    logout();
    header('Location: ' . $_SERVER['PHP_SELF']);
    exit;
}

// Handle authentication POST request
if ($_SERVER['REQUEST_METHOD'] === 'POST' && isset($_POST['authcode'])) {
    $submittedAuthCode = $_POST['authcode'];

    if (isset($user['authcode']) && authenticate($submittedAuthCode, $user['authcode'])) {
        // Authentication successful, redirect to clean URL
        header('Location: ' . $_SERVER['PHP_SELF']);
        exit;
    } else {
        // Authentication failed, show error
        $authError = true;
    }
}

// Check if user is authenticated
if (!isAuthenticated()) {
    // Show authentication form
    header('Content-Type: text/html; charset=UTF-8');
    require_once("/etc/eiou/src/gui/layout/authenticationForm.html");
    exit;
}

// User is authenticated, check session timeout
if (!checkSessionTimeout()) {
    // Session timed out, redirect to login
    header('Location: ' . $_SERVER['PHP_SELF']);
    exit;
}

// If we get here, authentication is valid and session is active

// Verify CSRF token for POST requests
verifyCSRFToken();

// Generate CSRF token for forms
$csrfToken = getCSRFToken();

// This file handles wallet interaction with the eIOU network
require_once("/etc/eiou/src/gui/functions/functions.php");

// Set content type for HTML
header('Content-Type: text/html; charset=UTF-8');
require_once("/etc/eiou/src/gui/layout/wallet.html");
?>
