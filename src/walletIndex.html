  echo "eIOU has not yet been initiated. Please run from terminal to initialize the system.";

// Check if auth code is provided
$authCode = $_GET['authcode'] ?? $_POST['authcode'] ?? '';

// Check for messages from redirects
if (empty($authCode) && isset($_GET['message'])) {
    // If no auth code but there's a message, redirect to auth page
    header('Location: ' . $_SERVER['PHP_SELF']);
    exit;
}

// If no auth code provided, show authentication form
if (empty($authCode)) {
    // Set content type for HTML
    header('Content-Type: text/html; charset=UTF-8');
    require_once("/etc/eiou/src/gui/layout/authenticationForm.html");
    exit;
}

    header('Location: ' . $_SERVER['PHP_SELF'] . '?error=invalid');
    exit;
}
