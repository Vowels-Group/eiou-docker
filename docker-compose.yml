# =============================================================================
# eIOU Docker Compose
# =============================================================================
#
# Runs a single eIOU node with all services (nginx, PHP-FPM, MariaDB, Tor).
#
# Quick start:
#   docker compose up -d --build
#
# Stop (preserves data):
#   docker compose down
#
# Stop and delete all data:
#   docker compose down -v
#
# View logs:
#   docker compose logs -f
#
# NODE_NAME controls the container name and volume names.
# Set it in a .env file next to this file containing:
#   NODE_NAME=my-wallet
#
# =============================================================================

x-node-name: &node-name ${NODE_NAME:-eiou-node}

services:
  eiou:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: *node-name
    networks:
      - eiou-network
    ports:
      # Bind to all interfaces so the node accepts incoming P2P connections
      # from other eIOU nodes on the internet. The built-in nginx provides
      # connection-level rate limiting, connection limits, and timeouts.
      - "80:80"
      - "443:443"
      #
      # REVERSE PROXY SETUP: If running behind an external reverse proxy
      # (Traefik, Caddy, nginx, etc.), restrict ports to localhost only.
      # Replace the two lines above with:
      #   - "127.0.0.1:80:80"
      #   - "127.0.0.1:443:443"
      #
      # For docker run, use the same syntax with -p:
      #   docker run -p 127.0.0.1:80:80 -p 127.0.0.1:443:443 ...

    # =========================================================================
    # ENVIRONMENT VARIABLES
    # =========================================================================
    #
    # All variables have sensible defaults. Set QUICKSTART for HTTP/HTTPS
    # mode, or omit it entirely for a Tor-only node.
    #
    # Full reference: docs/DOCKER_CONFIGURATION.md
    #
    # =========================================================================
    environment:

      # -----------------------------------------------------------------------
      # NODE IDENTITY
      # -----------------------------------------------------------------------

      # QUICKSTART (recommended)
      # Sets the node's hostname for HTTP/HTTPS mode. The node will be
      # reachable at http://<value> and https://<value> within the Docker
      # network. Also used as the display name and SSL certificate CN
      # unless overridden by the variables below.
      # If omitted, the node runs in Tor-only mode (reachable only via
      # its auto-generated .onion address).
      - QUICKSTART=eiou

      # EIOU_NAME (optional)
      # Display name shown in the local GUI wallet header and startup logs.
      # Purely cosmetic — never broadcast to contacts or other nodes.
      # Default: uses QUICKSTART value.
      # - EIOU_NAME=My Node

      # EIOU_HOST (optional)
      # Externally reachable address (IP or domain name).
      # Use this when your container is reachable at an address different
      # from the QUICKSTART hostname (e.g., a public IP or domain).
      # Default: uses QUICKSTART value.
      # - EIOU_HOST=192.168.1.100

      # EIOU_PORT (optional)
      # Port appended to HTTP/HTTPS URLs. Use when mapping to a non-standard
      # port (e.g., docker runs on 8443 externally).
      # Default: not appended (standard ports 80/443 assumed).
      # - EIOU_PORT=8443

      # -----------------------------------------------------------------------
      # WALLET RESTORATION (optional — choose one method)
      # -----------------------------------------------------------------------
      # Use these to restore an existing wallet from a BIP39 24-word seed
      # phrase. If neither is set, a new wallet is generated on first boot.

      # Method 1 — File-based (RECOMMENDED)
      # More secure: seed phrase is not visible in process listings or
      # environment variable dumps. Requires the seed file volume mount below.
      # - RESTORE_FILE=/restore/seed

      # Method 2 — Environment variable (less secure)
      # Seed phrase may appear in logs, docker inspect, or process listings.
      # The container clears this variable after successful restoration.
      # Note: quotes are required when using docker run -e, but optional here.
      # - RESTORE=word1 word2 word3 ... word24

      # -----------------------------------------------------------------------
      # SSL CERTIFICATE CONFIGURATION (optional)
      # -----------------------------------------------------------------------
      # When QUICKSTART is set, the container auto-generates a self-signed SSL
      # certificate. These variables let you customize or replace it.
      #
      # Certificate selection priority:
      #   1. External certs mounted at /ssl-certs (server.crt, server.key)
      #   2. Let's Encrypt (when LETSENCRYPT_EMAIL is set)
      #   3. CA-signed (when /ssl-ca/ca.crt is mounted)
      #   4. Self-signed (automatic fallback)

      # SSL_DOMAIN (optional)
      # Override the Common Name (CN) in the SSL certificate.
      # Default: uses EIOU_HOST, then QUICKSTART.
      # - SSL_DOMAIN=node.example.com

      # SSL_EXTRA_SANS (optional)
      # Additional Subject Alternative Names for the certificate.
      # Format: comma-separated TYPE:value pairs.
      # Supported: DNS:hostname, IP:address
      # - SSL_EXTRA_SANS=DNS:alt.example.com,IP:10.0.0.1

      # LETSENCRYPT_EMAIL (optional)
      # Setting this enables automatic Let's Encrypt certificate requests.
      # Requires: real FQDN domain, port 80 reachable from the internet.
      # Also receives certificate expiry warnings.
      # - LETSENCRYPT_EMAIL=admin@example.com

      # LETSENCRYPT_DOMAIN (optional)
      # Domain for the Let's Encrypt certificate.
      # Default: uses SSL_DOMAIN, then EIOU_HOST, then QUICKSTART.
      # - LETSENCRYPT_DOMAIN=node.example.com

      # LETSENCRYPT_STAGING (optional)
      # Use the Let's Encrypt staging server for testing (avoids rate limits).
      # Staging certificates are NOT browser-trusted. Remove after testing.
      # - LETSENCRYPT_STAGING=true

      # P2P_SSL_VERIFY (optional)
      # Verify SSL certificates when making outbound HTTPS P2P connections.
      # Set to false when all nodes use self-signed certificates.
      # Default: true
      # - P2P_SSL_VERIFY=false

      # P2P_CA_CERT (optional)
      # Path to a CA certificate file for P2P SSL verification.
      # Use with the CA volume mount below to trust a shared CA.
      # - P2P_CA_CERT=/ssl-ca/ca.crt

      # -----------------------------------------------------------------------
      # TIMEOUT CONFIGURATION (optional)
      # -----------------------------------------------------------------------
      # Increase these for WSL2 or slow/resource-constrained environments.

      # EIOU_HS_TIMEOUT (optional)
      # Seconds to wait for the Tor hidden service to become available.
      # Default: 60
      # - EIOU_HS_TIMEOUT=60

      # EIOU_TOR_TIMEOUT (optional)
      # Seconds to wait for Tor network connectivity verification.
      # Default: 120
      # - EIOU_TOR_TIMEOUT=120

      # -----------------------------------------------------------------------
      # DATA-AT-REST ENCRYPTION
      # -----------------------------------------------------------------------
      # MariaDB Transparent Data Encryption (TDE) is enabled automatically
      # after the wallet is generated. All database files (transactions,
      # contacts, balances) are encrypted at rest using a key derived from
      # the master encryption key. No configuration required.
      #
      # OPTIONAL: Volume key for additional hardening
      # For high-security or hosted environments with external secrets
      # management (Vault, Kubernetes secrets, Docker Swarm secrets), you
      # can add a passphrase that encrypts the master key itself on the
      # config volume. The secrets manager injects the passphrase on every
      # container start.
      #
      # EIOU_VOLUME_KEY_FILE (recommended — not visible in docker inspect)
      # Path to a file containing the passphrase. Use with a volume mount:
      #   volumes:
      #     - /secure/path/volume-key.txt:/volume-key:ro
      #   environment:
      #     - EIOU_VOLUME_KEY_FILE=/volume-key
      # - EIOU_VOLUME_KEY_FILE=/volume-key
      #
      # EIOU_VOLUME_KEY (convenient but less secure)
      # Passphrase as environment variable. Visible in docker inspect output.
      # - EIOU_VOLUME_KEY=your-strong-passphrase-here

      # -----------------------------------------------------------------------
      # FEATURE FLAGS (optional)
      # -----------------------------------------------------------------------

      # APP_DEBUG (optional)
      # Enables debug logging to the database (visible in the GUI debug panel).
      # Default: false (secure-by-default). Enable for development/testing.
      # - APP_DEBUG=true

      # EIOU_TEST_MODE (optional)
      # Enables manual message processing (eiou in / eiou out commands)
      # and bypasses rate limiting. For development/testing ONLY.
      # Default: false
      # - EIOU_TEST_MODE=true

      # EIOU_CONTACT_STATUS_ENABLED (optional)
      # Controls the background processor that pings contacts to update
      # their online/offline status. Disable in low-bandwidth environments
      # or during automated testing.
      # Default: true
      # - EIOU_CONTACT_STATUS_ENABLED=true

      # EIOU_BACKUP_AUTO_ENABLED (optional)
      # Automatic daily encrypted database backups at midnight.
      # Backups use AES-256-GCM encryption with the wallet's master key.
      # Only the 3 most recent backups are retained.
      # Default: true
      # - EIOU_BACKUP_AUTO_ENABLED=true

      # EIOU_AUTO_CHAIN_DROP_PROPOSE (optional)
      # Auto-propose chain drops when send/ping detects a mutual gap that
      # sync and backup recovery cannot repair.
      # Default: true
      # - EIOU_AUTO_CHAIN_DROP_PROPOSE=true

      # EIOU_AUTO_CHAIN_DROP_ACCEPT (optional)
      # Auto-accept incoming chain drop proposals (with balance guard).
      # The balance guard blocks auto-accept if missing transactions include
      # net payments owed to this node.
      # Default: false (all proposals require manual review)
      # - EIOU_AUTO_CHAIN_DROP_ACCEPT=false

      # EIOU_AUTO_CHAIN_DROP_ACCEPT_GUARD (optional)
      # Balance guard for auto-accept. When enabled, compares stored vs
      # calculated balances before accepting. Set to false for unconditional
      # auto-accept. Only relevant when EIOU_AUTO_CHAIN_DROP_ACCEPT=true.
      # Default: true (guard enabled)
      # - EIOU_AUTO_CHAIN_DROP_ACCEPT_GUARD=true

      # -----------------------------------------------------------------------
      # SERVICE TUNING (advanced)
      # -----------------------------------------------------------------------
      # Override PHP-FPM and Nginx defaults for scaling. Applied at boot.
      # See .env.example for full documentation of each variable.
      #
      # PHP-FPM:
      # - PHP_FPM_PM=ondemand            # ondemand|dynamic|static
      # - PHP_FPM_MAX_CHILDREN=5         # Max PHP workers (~20-30MB each)
      # - PHP_FPM_MAX_REQUESTS=500       # Recycle after N requests (0=never)
      #
      # Nginx:
      # - NGINX_WORKER_PROCESSES=2       # Match to CPU allocation
      # - NGINX_WORKER_CONNECTIONS=768   # Max connections per worker
      # - NGINX_RATE_LIMIT_P2P=20r/s     # P2P endpoint rate limit
      # -----------------------------------------------------------------------

    # =========================================================================
    # VOLUME MOUNTS
    # =========================================================================
    #
    # Named volumes persist data across container restarts and rebuilds.
    # Volume names are derived from NODE_NAME (default: eiou-node).
    # Use 'docker compose down -v' to remove all data and start fresh.
    #
    # BACKUP PRIORITY:
    #   CRITICAL — mysql-data (transactions, contacts, balances)
    #   CRITICAL — config (wallet keys, encryption keys, config)
    #   CRITICAL — backups (encrypted database backups)
    #
    # =========================================================================
    volumes:
      # Database: transactions, contacts, balances
      # This is your transaction history — back this up.
      - mysql-data:/var/lib/mysql

      # Config: wallet private keys, encryption keys, userconfig.json
      # Without this, your wallet identity is lost — back this up.
      # Note: Source code lives in /app/eiou/ (image filesystem, not this volume).
      - config:/etc/eiou/config

      # Backups: encrypted daily database backups (AES-256-GCM)
      # Off-site storage recommended for disaster recovery.
      - backups:/var/lib/eiou/backups

      # Let's Encrypt certificate persistence
      # Keeps certificates across container restarts and rebuilds.
      # Pre-created so certbot state is always tied to a named volume
      # (avoids dangling anonymous volumes from the Dockerfile VOLUME directive).
      # Safe to comment out if you will never use Let's Encrypt.
      - letsencrypt:/etc/letsencrypt

      # OPTIONAL: External SSL certificates (Let's Encrypt wildcard, commercial CA)
      # Mount a directory containing server.crt and server.key (PEM format).
      # Optional: ca-chain.crt for the CA certificate chain.
      # See: docs/DOCKER_CONFIGURATION.md#external-certificates-manual
      # - ./my-certs:/ssl-certs:ro

      # OPTIONAL: CA-signed certificates (development/testing)
      # Generate a CA first: ./scripts/create-ssl-ca.sh ./ssl-ca
      # Then install ssl-ca/ca.crt in your browser trust store.
      # See: docs/DOCKER_CONFIGURATION.md#local-ca-developmenttesting
      # - ./ssl-ca:/ssl-ca:ro

      # OPTIONAL: Wallet restoration from seed file (TEMPORARY MOUNT)
      # Use with RESTORE_FILE=/restore/seed environment variable.
      # After successful restoration, remove this mount AND delete the seed
      # file from disk. Never leave seed phrases on persistent storage.
      # - /path/to/seed.txt:/restore/seed:ro

    # =========================================================================
    # CONTAINER SETTINGS
    # =========================================================================
    # =========================================================================
    # SECURITY HARDENING
    # =========================================================================
    # Drop all Linux capabilities and re-add only what the container needs:
    #   CHOWN          - chown files to www-data/debian-tor/mysql after volume sync
    #   DAC_OVERRIDE   - read/write files owned by service users during startup
    #   FOWNER         - chmod on files not owned by root (Tor HS keys, PHP logs)
    #   KILL           - watchdog sends SIGTERM to crashed processors; graceful shutdown
    #   NET_BIND_SERVICE - bind nginx to ports 80/443
    #   SETGID         - runuser/service switch to www-data, debian-tor, mysql groups
    #   SETUID         - runuser/service switch to www-data, debian-tor, mysql users
    # =========================================================================
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
          pids: 200
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  eiou-network:
    driver: bridge
    name: eiou-network

# =============================================================================
# NAMED VOLUMES
# =============================================================================
# Volume names are derived from NODE_NAME (default: eiou-node).
# To completely reset all data: docker compose down -v
# =============================================================================
volumes:
  mysql-data:
    name: ${NODE_NAME:-eiou-node}-mysql-data
  config:
    name: ${NODE_NAME:-eiou-node}-config
  backups:
    name: ${NODE_NAME:-eiou-node}-backups
  letsencrypt:
    name: ${NODE_NAME:-eiou-node}-letsencrypt
