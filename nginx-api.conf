# Nginx configuration for eIOU API
# Place this file in /etc/nginx/sites-available/eiou-api
# Then symlink to /etc/nginx/sites-enabled/eiou-api

server {
    listen 80;
    server_name localhost;

    # Root directory
    root /app/public;
    index api.php;

    # API endpoint
    location /api {
        try_files $uri $uri/ /api.php?$query_string;
    }

    # API PHP handler
    location ~ ^/api\.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Legacy GUI (existing functionality)
    location / {
        root /etc/eiou/src/gui;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler for GUI
    location ~ \.php$ {
        root /etc/eiou/src/gui;
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers (already handled by PHP, but can be added here too)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

    # Handle OPTIONS requests for CORS
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
    }

    # Logging
    access_log /var/log/nginx/eiou-api-access.log;
    error_log /var/log/nginx/eiou-api-error.log;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Increase timeouts for long-running operations
    fastcgi_read_timeout 300s;
    fastcgi_send_timeout 300s;
}
