name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-discussion"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: This feature aligns with EIOU's privacy-first philosophy
          required: true
        - label: I have reviewed the project documentation
          required: false

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Core Protocol Enhancement
        - Privacy/Security Feature
        - Performance Optimization
        - Transaction/Payment Feature
        - Contact Management
        - P2P Routing Improvement
        - Developer Experience
        - Documentation
        - Testing/CI
        - Docker/Infrastructure
        - CLI Enhancement
        - GUI/Web Wallet Feature
        - New Network Topology
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High (Critical for adoption/usability)
        - Medium (Useful enhancement)
        - Low (Nice to have)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: |
        Describe the problem or limitation you're facing.

        For example: "As a user, I can't easily..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: |
        Describe your proposed solution in detail.

        - What should happen?
        - How should users interact with it?
        - What are the expected outcomes?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: What other approaches have you considered?
      placeholder: |
        Describe alternative solutions you've thought about.

        Why might the proposed solution be better?

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Technical implementation suggestions (optional)
      placeholder: |
        If you have technical implementation ideas:

        - Modify file X to add Y
        - Create new service/class Z
        - Update database schema with W
        - Add new Docker configuration for V

  - type: textarea
    id: breaking
    attributes:
      label: Breaking Changes
      description: Will this require breaking changes?
      placeholder: |
        Describe any backward compatibility concerns:

        - Changes to existing APIs
        - Database migrations
        - Configuration changes
        - Docker compose file changes

  - type: textarea
    id: testing
    attributes:
      label: Testing Strategy
      description: How should this feature be tested?
      placeholder: |
        Suggest testing approaches:

        - Unit tests for...
        - Integration tests for...
        - Docker topology tests for...
        - Manual testing steps...

  - type: textarea
    id: documentation
    attributes:
      label: Documentation Needs
      description: What documentation will be required?
      placeholder: |
        - Update README.md with...
        - Create new guide for...
        - Update architecture docs...
        - Add CLI documentation...

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Describe specific use cases that would benefit
      placeholder: |
        1. User wants to...
        2. Developer needs to...
        3. Network operator requires...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature
        - label: I am willing to write tests
        - label: I am willing to write documentation
        - label: I can help with code review
