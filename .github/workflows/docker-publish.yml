# Copyright 2025-2026 Vowels Group, LLC
#
# Builds and publishes the eIOU Docker image when a GitHub release is created.
# Pushes the image to Docker Hub and attaches the image tarball to the release.
#
# Supported tag formats:
#   v1.0.0        → stable release (also tagged latest, 1.0, 1)
#   v1.0.0-alpha  → alpha pre-release
#   v1.0.0-beta   → beta pre-release
#
# Required secrets:
#   DOCKER_USERNAME — Docker Hub username
#   DOCKER_PASSWORD — Docker Hub password or access token

name: Publish Docker Image

on:
  release:
    types: [published]

permissions:
  contents: write    # upload release assets

jobs:
  build-and-push:
    name: Build & Publish
    runs-on: ubuntu-latest
    # Only run for version tags (vX.Y.Z, vX.Y.Z-alpha, vX.Y.Z-beta)
    if: >-
      startsWith(github.event.release.tag_name, 'v') &&
      contains(github.event.release.tag_name, '.')
    timeout-minutes: 30

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Extract version metadata"
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Determine release channel
          if [[ "$VERSION" == *-alpha* ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Log in to Docker Hub"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Generate Docker tags"
        id: tags
        run: |
          IMAGE="eiou/eiou"
          VERSION="${{ steps.meta.outputs.version }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"

          # Always tag with the full version and latest
          TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"

          # Stable releases get additional convenience tags
          if [ "$CHANNEL" = "stable" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            TAGS="${TAGS},${IMAGE}:${MAJOR}.${MINOR},${IMAGE}:${MAJOR}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "### Docker Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$TAGS" | tr ',' '\n' | while read -r t; do
            echo "- \`$t\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: "Build and push to Docker Hub"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: eiou.dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Load into local daemon so the export step doesn't need to pull from Hub
          load: true

      - name: "Export image for release attachment"
        run: |
          IMAGE="eiou/eiou"
          VERSION="${{ steps.meta.outputs.version }}"
          docker save "${IMAGE}:${VERSION}" | gzip > "eiou-node-${VERSION}.tar.gz"
          ls -lh "eiou-node-${VERSION}.tar.gz"

      - name: "Upload image to GitHub release"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          gh release upload "${TAG}" \
            "eiou-node-${VERSION}.tar.gz" \
            --clobber

      - name: "Add Docker Hub reference to release notes"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          gh release view "${TAG}" --json body -q '.body' > /tmp/release-notes.md
          cat >> /tmp/release-notes.md <<EOF

          ---

          ### Docker Image

          \`\`\`bash
          docker pull eiou/eiou:${VERSION}
          \`\`\`

          [View on Docker Hub](https://hub.docker.com/r/eiou/eiou/tags?name=${VERSION})
          EOF
          gh release edit "${TAG}" --notes-file /tmp/release-notes.md

      - name: "Summary"
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Channel**: ${CHANNEL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Docker Hub**: \`docker pull eiou/eiou:${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release asset**: \`eiou-node-${VERSION}.tar.gz\`" >> "$GITHUB_STEP_SUMMARY"
