# Copyright 2025-2026 Vowels Group, LLC
#
# Runs the PHPUnit test suite on every pull request and push to main.
# Ensures PHP code changes don't introduce regressions.

name: PHPUnit Tests

on:
  push:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  phpunit:
    name: PHPUnit Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Set up PHP 8.2"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, curl, xml, json
          coverage: none

      - name: "Install Composer dependencies"
        working-directory: files
        run: composer install --no-interaction --prefer-dist

      - name: "Audit Composer dependencies for known vulnerabilities"
        working-directory: files
        run: composer audit --format=plain

      - name: "Prepare test environment"
        run: |
          cp tests/phpunit.xml.dist tests/phpunit.xml
          mkdir -p test-results

      - name: "List tests in execution order"
        working-directory: files
        run: |
          # Get the ordered test list so we can map progress dot positions
          # to actual test names (e.g. dot #154 = test #154 in this list).
          vendor/bin/phpunit --configuration ../tests/phpunit.xml \
            --list-tests 2>/dev/null | grep '^ - ' > /tmp/phpunit-test-list.txt
          echo "Total tests listed: $(wc -l < /tmp/phpunit-test-list.txt)"

      - name: "Run PHPUnit"
        id: phpunit
        working-directory: files
        run: |
          # Run WITH progress dots enabled so we can see S/F/E positions.
          # Each character in the progress output maps 1:1 to the test list.
          # --display-skipped and --display-incomplete print detail sections
          # at the end for any non-passing tests.
          set +e
          vendor/bin/phpunit \
            --configuration ../tests/phpunit.xml \
            --display-skipped --display-incomplete \
            --colors=never 2>&1 | tee /tmp/phpunit-output.txt
          PHPUNIT_EXIT=${PIPESTATUS[0]}
          set -e
          echo "PHPUNIT_EXIT=${PHPUNIT_EXIT}" >> "$GITHUB_ENV"
          exit ${PHPUNIT_EXIT}

      - name: "Generate test report"
        if: always()
        run: |
          JUNIT_OUT="${GITHUB_WORKSPACE}/test-results/phpunit.xml"
          PHPUNIT_EXIT="${PHPUNIT_EXIT:-0}"

          if [ -s /tmp/phpunit-output.txt ]; then
            php "${GITHUB_WORKSPACE}/tests/ci/generate-junit-xml.php" \
              /tmp/phpunit-output.txt \
              /tmp/phpunit-test-list.txt \
              "${JUNIT_OUT}" \
              "${PHPUNIT_EXIT}"
          else
            # Fallback: generate minimal JUnit XML from exit code
            if [ "${PHPUNIT_EXIT}" = "0" ]; then
              printf '<?xml version="1.0"?>\n<testsuites><testsuite name="PHPUnit" tests="1" failures="0" errors="0" skipped="0"><testcase name="All tests passed" classname="PHPUnit"/></testsuite></testsuites>\n' > "${JUNIT_OUT}"
            else
              printf '<?xml version="1.0"?>\n<testsuites><testsuite name="PHPUnit" tests="1" failures="1" errors="0" skipped="0"><testcase name="PHPUnit test suite" classname="PHPUnit"><failure message="Tests failed"/></testcase></testsuite></testsuites>\n' > "${JUNIT_OUT}"
            fi
          fi
          ls -la "${JUNIT_OUT}"

      - name: "Publish test report"
        if: always() && hashFiles('test-results/phpunit.xml') != ''
        uses: dorny/test-reporter@v2
        with:
          name: PHPUnit Results
          path: test-results/phpunit.xml
          reporter: java-junit
          fail-on-empty: 'false'

      - name: "Upload JUnit XML"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phpunit-junit-xml
          path: test-results/phpunit.xml
          retention-days: 30
          if-no-files-found: warn
