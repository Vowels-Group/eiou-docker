#
# Runs the PHPUnit test suite on every pull request and push to main.
# Ensures PHP code changes don't introduce regressions.

name: PHPUnit Tests

on:
  push:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  phpunit:
    name: PHPUnit Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up PHP 8.2"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, curl, xml, json
          coverage: none

      - name: "Install Composer dependencies"
        working-directory: files
        run: composer install --no-interaction --prefer-dist

      - name: "Prepare test environment"
        run: |
          cp tests/phpunit.xml.dist tests/phpunit.xml
          mkdir -p test-results

      - name: "Run PHPUnit"
        id: phpunit
        working-directory: files
        run: |
          # Run PHPUnit directly to stdout (same as main branch).
          # --no-progress avoids truncated progress dots in CI.
          # --colors=always ensures output is visible in CI logs.
          vendor/bin/phpunit --configuration ../tests/phpunit.xml --no-progress --colors=always

      - name: "Generate test report"
        if: always()
        working-directory: files
        run: |
          JUNIT_OUT="${GITHUB_WORKSPACE}/test-results/phpunit.xml"

          # PHPUnit 11's --log-junit and stdout both produce incomplete output
          # in CI. Generate a minimal JUnit XML from the step outcome instead.
          # When tests fail, individual failure details are visible in the
          # "Run PHPUnit" step logs above.
          STEP_OUTCOME="${{ steps.phpunit.outcome }}"
          if [ "$STEP_OUTCOME" = "success" ]; then
            cat > "${JUNIT_OUT}" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="PHPUnit" tests="1" failures="0" errors="0" skipped="0"><testcase name="All tests passed" classname="PHPUnit" time="0"/></testsuite></testsuites>
          EOF
          else
            cat > "${JUNIT_OUT}" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites><testsuite name="PHPUnit" tests="1" failures="1" errors="0" skipped="0"><testcase name="PHPUnit test suite" classname="PHPUnit" time="0"><failure message="Tests failed - check Run PHPUnit step logs for details"/></testcase></testsuite></testsuites>
          EOF
          fi
          ls -la "${JUNIT_OUT}"

      - name: "Publish test report"
        if: always() && hashFiles('test-results/phpunit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: PHPUnit Results
          path: test-results/phpunit.xml
          reporter: java-junit
          fail-on-empty: 'false'

      - name: "Upload JUnit XML"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit-xml
          path: test-results/phpunit.xml
          retention-days: 30
          if-no-files-found: warn
