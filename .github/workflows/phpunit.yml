#
# Runs the PHPUnit test suite on every pull request and push to main.
# Ensures PHP code changes don't introduce regressions.

name: PHPUnit Tests

on:
  push:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'files/src/**'
      - 'files/composer.json'
      - 'files/composer.lock'
      - 'tests/Unit/**'
      - 'tests/bootstrap.php'
      - 'tests/phpunit.xml.dist'
      - '.github/workflows/phpunit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up PHP 8.2"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, curl, xml, json
          coverage: none

      - name: "Install Composer dependencies"
        working-directory: files
        run: composer install --no-interaction --prefer-dist

      - name: "Prepare PHPUnit config"
        run: cp tests/phpunit.xml.dist tests/phpunit.xml

      - name: "Run PHPUnit"
        working-directory: files
        run: vendor/bin/phpunit --configuration ../tests/phpunit.xml --colors=always

      - name: "Test summary"
        if: always()
        run: |
          echo "### PHPUnit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "All tests passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "One or more tests failed. Check the logs above for details." >> "$GITHUB_STEP_SUMMARY"
          fi
