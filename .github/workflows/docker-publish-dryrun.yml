#
# Dry-run counterpart of docker-publish.yml. Exercises the same matrix
# build + manifest-merge flow, but pushes to eiou/eiou-test (a throwaway
# Docker Hub repository) and attaches tarballs as workflow artifacts
# instead of GitHub release assets. Use to validate multi-arch publish
# end-to-end before cutting a real release.
#
# Trigger: GitHub Actions → "Dry-run Publish Docker Image" → Run workflow.
# Input "version" defaults to 0.0.0-dryrun; pass a real-shaped version
# (e.g. 1.2.3-alpha, 1.2.3) to exercise the channel + stable-tag logic.
#
# Required secrets:
#   DOCKER_USERNAME — must have write access to eiou/eiou-test
#   DOCKER_PASSWORD — Docker Hub password or access token

name: Dry-run Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Fake version (e.g. 0.0.0-dryrun, 1.2.3-alpha, 1.2.3)"
        required: true
        default: "0.0.0-dryrun"

permissions:
  contents: read

env:
  IMAGE: eiou/eiou-test

jobs:
  meta:
    name: Resolve version + tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      channel: ${{ steps.channel.outputs.channel }}
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - name: "Detect channel"
        id: channel
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" == *-alpha* ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-* ]]; then
            # Any other pre-release suffix (rc, dryrun, etc.) — treat as non-stable
            echo "channel=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: "Generate Docker tags"
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          CHANNEL="${{ steps.channel.outputs.channel }}"

          TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"

          if [ "$CHANNEL" = "stable" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            TAGS="${TAGS},${IMAGE}:${MAJOR}.${MINOR},${IMAGE}:${MAJOR}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          echo "### Docker Tags (dry run)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$TAGS" | tr ',' '\n' | while read -r t; do
            echo "- \`$t\`" >> "$GITHUB_STEP_SUMMARY"
          done

  build:
    name: Build ${{ matrix.platform }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Log in to Docker Hub"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build and push by digest"
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: eiou.dockerfile
          platforms: linux/${{ matrix.platform }}
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=dryrun-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=dryrun-${{ matrix.platform }}

      - name: "Export digest"
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: "Upload digest"
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: "Build tarball image (single-arch, loaded)"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: eiou.dockerfile
          platforms: linux/${{ matrix.platform }}
          tags: ${{ env.IMAGE }}:${{ needs.meta.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false
          load: true
          cache-from: type=gha,scope=dryrun-${{ matrix.platform }}

      - name: "Export image tarball"
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          ARCH="${{ matrix.platform }}"
          docker save "${IMAGE}:${VERSION}" | gzip > "eiou-node-${VERSION}-${ARCH}.tar.gz"
          ls -lh "eiou-node-${VERSION}-${ARCH}.tar.gz"

      - name: "Upload tarball as workflow artifact"
        uses: actions/upload-artifact@v7
        with:
          name: tarball-${{ matrix.platform }}
          path: eiou-node-${{ needs.meta.outputs.version }}-${{ matrix.platform }}.tar.gz
          retention-days: 7

  merge:
    name: Merge manifests
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: "Download per-arch digests"
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Log in to Docker Hub"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Create multi-arch manifest list"
        run: |
          cd /tmp/digests

          TAG_ARGS=""
          IFS=',' read -ra TAG_ARR <<< "${{ needs.meta.outputs.tags }}"
          for t in "${TAG_ARR[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $t"
          done

          SOURCES=""
          for f in *; do
            SOURCES="$SOURCES ${IMAGE}@sha256:$f"
          done

          echo "docker buildx imagetools create$TAG_ARGS$SOURCES"
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: "Inspect published manifest"
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}" | tee /tmp/inspect.txt
          {
            echo "### Dry-run Manifest"
            echo ""
            echo "**Image**: \`${IMAGE}:${VERSION}\`"
            echo ""
            echo '```'
            cat /tmp/inspect.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Dry-run summary + verification steps"
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          {
            echo ""
            echo "### Dry Run Complete ✅"
            echo ""
            echo "Pushed to **\`${IMAGE}:${VERSION}\`** (NOT \`eiou/eiou\`)."
            echo ""
            echo "#### Manual verification"
            echo ""
            echo "Run on an amd64 host:"
            echo '```bash'
            echo "docker pull --platform linux/amd64 ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "Run on an arm64 host (Apple Silicon, Raspberry Pi, Graviton):"
            echo '```bash'
            echo "docker pull --platform linux/arm64 ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "#### Artifacts"
            echo ""
            echo "- \`tarball-amd64\` — \`eiou-node-${VERSION}-amd64.tar.gz\`"
            echo "- \`tarball-arm64\` — \`eiou-node-${VERSION}-arm64.tar.gz\`"
            echo ""
            echo "Both retained 7 days on this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
