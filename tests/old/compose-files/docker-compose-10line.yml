# =============================================================================
# EIOU Docker - 10-Node Line Topology
# =============================================================================
# Purpose: 10-node linear chain for extended routing and scaling tests
#
# Topology:
#   node-a <-> node-b <-> node-c <-> node-d <-> node-e <->
#   node-f <-> node-g <-> node-h <-> node-i <-> node-j
#
# Resource Requirements: ~2.8GB RAM total
#
# Usage:
#   docker-compose -f docker-compose-10line.yml up -d --build
#   docker-compose -f docker-compose-10line.yml down -v
#
# Documentation:
#   For complete environment variable and volume documentation, see:
#   - docs/DOCKER_CONFIGURATION.md (comprehensive reference)
#   - docker-compose-single.yml (reference template with inline docs)
#
# Note: This compose file creates standalone containers without contact
# interconnections. Node contacts must be established manually after
# startup. The topology diagram above is a suggested configuration;
# nodes can be interconnected in any desired pattern.
#
# NOTE: Default p2pRequestLevel max is 5 hops. Some routing tests
# between distant nodes may need this limit adjusted.
# =============================================================================

# Copyright 2025-2026 Vowels Group, LLC
services:
  node-a:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: node-a
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    environment:
      - QUICKSTART=node-a
      # Node Identity (optional - override QUICKSTART for production use):
      # - EIOU_NAME=Node A       # Display name (defaults to QUICKSTART)
      # - EIOU_HOST=10.0.0.1     # External address (defaults to QUICKSTART)
      # - EIOU_PORT=8443         # Port for HTTP/HTTPS URLs
      # WSL2/Slow Environment Timeouts (optional, applies to all nodes):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
    volumes:
      - node-a-mysql-data:/var/lib/mysql
      - node-a-config:/etc/eiou/config
      - node-a-backups:/var/lib/eiou/backups
      - node-a-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

