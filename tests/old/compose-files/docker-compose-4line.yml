# =============================================================================
# EIOU Docker - 4-Node Line Topology
# =============================================================================
# Purpose: 4-node linear chain for multi-hop routing and sync tests
#
# Topology:
#   alice <---> bob <---> carol <---> daniel
#
# Resource Requirements: ~1.1GB RAM total
#
# Usage:
#   docker-compose -f docker-compose-4line.yml up -d --build
#   docker-compose -f docker-compose-4line.yml down -v
#
# Documentation:
#   For complete environment variable and volume documentation, see:
#   - docs/DOCKER_CONFIGURATION.md (comprehensive reference)
#   - docker-compose-single.yml (reference template with inline docs)
#
# Note: This compose file creates standalone containers without contact
# interconnections. Node contacts must be established manually after
# startup. The topology diagram above is a suggested configuration;
# nodes can be interconnected in any desired pattern.
# =============================================================================

# Copyright 2025-2026 Vowels Group, LLC
services:
  alice:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: alice
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    environment:
      - QUICKSTART=alice
      # Node Identity (optional - override QUICKSTART for production use):
      # - EIOU_NAME=Alice        # Display name (defaults to QUICKSTART)
      # - EIOU_HOST=10.0.0.1     # External address (defaults to QUICKSTART)
      # - EIOU_PORT=8443         # Port for HTTP/HTTPS URLs
      # WSL2/Slow Environment Timeouts (optional, applies to all nodes):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
      # SSL Configuration (optional):
      # - SSL_DOMAIN=alice.example.com     # Override certificate CN
      # - SSL_EXTRA_SANS=DNS:alice.local   # Additional SANs
    # For Let's Encrypt wildcard cert across all nodes:
    # 1. Run: ./scripts/create-ssl-letsencrypt.sh -d nodes.example.com -e admin@example.com --wildcard --dns-plugin cloudflare --credentials ./cloudflare.ini
    # 2. Uncomment and add to each node's volumes:
    #   - ./letsencrypt-certs:/ssl-certs:ro
    # For CA-signed certificates (development), uncomment:
    #   - ./ssl-ca:/ssl-ca:ro
    volumes:
      - alice-mysql-data:/var/lib/mysql
      - alice-config:/etc/eiou/config
      - alice-backups:/var/lib/eiou/backups
      - alice-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  bob:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: bob
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8081:80"
      - "127.0.0.1:8444:443"
    environment:
      - QUICKSTART=bob
    volumes:
      - bob-mysql-data:/var/lib/mysql
      - bob-config:/etc/eiou/config
      - bob-backups:/var/lib/eiou/backups
      - bob-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  carol:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: carol
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8082:80"
      - "127.0.0.1:8445:443"
    environment:
      - QUICKSTART=carol
    volumes:
      - carol-mysql-data:/var/lib/mysql
      - carol-config:/etc/eiou/config
      - carol-backups:/var/lib/eiou/backups
      - carol-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  daniel:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: daniel
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8083:80"
      - "127.0.0.1:8446:443"
    environment:
      - QUICKSTART=daniel
    volumes:
      - daniel-mysql-data:/var/lib/mysql
      - daniel-config:/etc/eiou/config
      - daniel-backups:/var/lib/eiou/backups
      - daniel-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

networks:
  eiou-network-compose:
    driver: bridge
    name: eiou-network-compose

volumes:
  alice-mysql-data:
    name: alice-mysql-data
  alice-config:
    name: alice-config
  alice-backups:
    name: alice-backups
  alice-letsencrypt:
    name: alice-letsencrypt

  bob-mysql-data:
    name: bob-mysql-data
  bob-config:
    name: bob-config
  bob-backups:
    name: bob-backups
  bob-letsencrypt:
    name: bob-letsencrypt

  carol-mysql-data:
    name: carol-mysql-data
  carol-config:
    name: carol-config
  carol-backups:
    name: carol-backups
  carol-letsencrypt:
    name: carol-letsencrypt

  daniel-mysql-data:
    name: daniel-mysql-data
  daniel-config:
    name: daniel-config
  daniel-backups:
    name: daniel-backups
  daniel-letsencrypt:
    name: daniel-letsencrypt
