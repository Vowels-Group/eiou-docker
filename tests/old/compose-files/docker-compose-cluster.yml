# =============================================================================
# eIOU Docker - 13-Node Cluster Topology
# =============================================================================
# Purpose: Hierarchical star cluster for complex routing and network tests
#
# Topology (star with 4 branches, each with 2 leaf nodes):
#
#   a31 a32     a41 a42
#     \  /       \  /
#      a3         a4
#        \       /
#          a0
#        /       \
#      a2         a1
#     /  \       /  \
#   a22 a21   a12  a11
#
# Center: cluster-a0 (hub)
# Branches: cluster-a1, cluster-a2, cluster-a3, cluster-a4
# Leaves: cluster-a11, cluster-a12, cluster-a21, cluster-a22,
#         cluster-a31, cluster-a32, cluster-a41, cluster-a42
#
# Total: 13 nodes (1 hub + 4 branches + 8 leaves)
#
# Resource Requirements: ~3.5GB RAM total
#
# Usage:
#   docker-compose -f docker-compose-cluster.yml up -d --build
#   docker-compose -f docker-compose-cluster.yml down -v
#
# Documentation:
#   For complete environment variable and volume documentation, see:
#   - docs/DOCKER_CONFIGURATION.md (comprehensive reference)
#   - docker-compose-single.yml (reference template with inline docs)
#
# Note: This compose file creates standalone containers without contact
# interconnections. Node contacts must be established manually after
# startup. The topology diagram above is a suggested configuration;
# nodes can be interconnected in any desired pattern.
# =============================================================================

# Copyright 2025-2026 Vowels Group, LLC
services:
  # Root node
  cluster-a0:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: cluster-a0
    networks:
      - eiou-network-compose
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    environment:
      - QUICKSTART=cluster-a0
      # Node Identity (optional - override QUICKSTART for production use):
      # - EIOU_NAME=Cluster Hub  # Display name (defaults to QUICKSTART)
      # - EIOU_HOST=10.0.0.1     # External address (defaults to QUICKSTART)
      # - EIOU_PORT=8443         # Port for HTTP/HTTPS URLs
      # WSL2/Slow Environment Timeouts (optional, applies to all nodes):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
    volumes:
      - cluster-a0-mysql-data:/var/lib/mysql
      - cluster-a0-config:/etc/eiou/config
      - cluster-a0-backups:/var/lib/eiou/backups
      - cluster-a0-letsencrypt:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/gui/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

