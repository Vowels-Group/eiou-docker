# =============================================================================
# EIOU Docker - 13-Node Cluster Topology
# =============================================================================
# Purpose: Hierarchical star cluster for complex routing and network tests
#
# Topology (star with 4 branches, each with 2 leaf nodes):
#
#   a31 a32     a41 a42
#     \  /       \  /
#      a3         a4
#        \       /
#           a
#        /       \
#      a2         a1
#     /  \       /  \
#   a22 a21   a12  a11
#
# Center: cluster-a (hub)
# Branches: cluster-a1, cluster-a2, cluster-a3, cluster-a4
# Leaves: cluster-a11, cluster-a12, cluster-a21, cluster-a22,
#         cluster-a31, cluster-a32, cluster-a41, cluster-a42
#
# Total: 13 nodes (1 hub + 4 branches + 8 leaves)
#
# Resource Requirements: ~3.5GB RAM total
#
# Usage:
#   docker-compose -f docker-compose-cluster.yml up -d --build
#   docker-compose -f docker-compose-cluster.yml down -v
#
# Note: This compose file creates standalone containers without contact
# interconnections. Node contacts must be established manually after
# startup. The topology diagram above is a suggested configuration;
# nodes can be interconnected in any desired pattern.
# =============================================================================

# Copyright 2025-2026 Vowels Group, LLC
services:
  # Root node
  cluster-a:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: cluster-a
    networks:
      - eiou-network-compose
    ports:
      - "80:80"
      - "443:443"
    environment:
      - QUICKSTART=cluster-a
      # WSL2/Slow Environment Timeouts (optional, applies to all nodes):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
    volumes:
      - cluster-a-mysql-data:/var/lib/mysql
      - cluster-a-files:/etc/eiou/
      - cluster-a-index:/var/www/html
      - cluster-a-eiou:/usr/local/bin/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    stop_grace_period: 45s

  # Level 1 nodes
  cluster-a1:
