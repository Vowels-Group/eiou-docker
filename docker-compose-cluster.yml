services:
  # Root node
  cluster-a:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: cluster-a
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=cluster-a
    volumes:
      - cluster-a-mysql-data:/var/lib/mysql
      - ./src:/etc/eiou/src
    restart: unless-stopped

