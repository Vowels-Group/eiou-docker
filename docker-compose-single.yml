services:
  eioud:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: eioud-single
    networks:
      - eiou-network-compose
    ports:
      - "80:80"
      - "443:443"
    environment:
      - QUICKSTART=eioud
      # WSL2/Slow Environment Timeouts (optional):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
      # SSL Configuration (optional):
      # - SSL_DOMAIN=node.example.com       # Override certificate CN
      # - SSL_EXTRA_SANS=DNS:alt.local,IP:10.0.0.1  # Additional SANs
    # For external certificates (Let's Encrypt, etc.), uncomment:
    # volumes:
    #   - /path/to/certs:/ssl-certs:ro     # Mount server.crt, server.key
    # For CA-signed certificates, uncomment:
    #   - ./ssl-ca:/ssl-ca:ro              # Mount ca.crt, ca.key
    volumes:
      - eioud-mysql-data:/var/lib/mysql
      - eioud-files:/etc/eiou/
      - eioud-index:/var/www/html
      - eioud-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

networks:
  eiou-network-compose:
    driver: bridge
    name: eiou-network-compose

volumes:
  eioud-mysql-data:
    name: eioud-mysql-data
  eioud-files:
    name: eioud-files
  eioud-index:
    name: eioud-index
  eioud-eiou:
    name: eioud-eiou