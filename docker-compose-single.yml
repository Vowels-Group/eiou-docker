services:
  eioud:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: eioud-single
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=eioud
    ports:
      - "8080:80"
    volumes:
      - eioud-mysql-data:/var/lib/mysql
      - ./src:/etc/eiou/src
      - ./public:/app/public
    restart: unless-stopped

networks:
  eiou-network-compose:
    driver: bridge
    name: eiou-network-compose

volumes:
  eioud-mysql-data:
    name: eioud-mysql-data