# =============================================================================
# EIOU Docker - Single Node Configuration
# =============================================================================
# Purpose: Single container for basic testing and development
#
# Topology: Single node (alice)
#
# Resource Requirements: ~275MB RAM
#
# Usage:
#   docker-compose -f docker-compose-single.yml up -d --build
#   docker-compose -f docker-compose-single.yml down -v
#
# Environment Variables:
#   EIOU_INIT_TIMEOUT: Initialization timeout in seconds (default: 120)
#                      Increase for WSL2 or slow environments
#
# Note: This compose file creates a standalone container. For multi-node
# setups, contacts must be established manually after container startup.
# =============================================================================

# Copyright 2025-2026 Vowels Group, LLC
services:
  eiou:
    build:
      context: .
      dockerfile: eiou.dockerfile
    container_name: eiou-single
    networks:
      - eiou-network-compose
    ports:
      - "80:80"
      - "443:443"
    environment:
      - QUICKSTART=eiou
      # WSL2/Slow Environment Timeouts (optional):
      # - EIOU_HS_TIMEOUT=60                # Hidden service wait (default: 60s)
      # - EIOU_TOR_TIMEOUT=120              # Tor connection wait (default: 120s)
      # SSL Configuration (optional):
      # - SSL_DOMAIN=node.example.com       # Override certificate CN
      # - SSL_EXTRA_SANS=DNS:alt.local,IP:10.0.0.1  # Additional SANs
    # For external certificates (Let's Encrypt, etc.), uncomment:
    # volumes:
    #   - /path/to/certs:/ssl-certs:ro     # Mount server.crt, server.key
    # For CA-signed certificates, uncomment:
    #   - ./ssl-ca:/ssl-ca:ro              # Mount ca.crt, ca.key
    volumes:
      - eiou-mysql-data:/var/lib/mysql
      - eiou-files:/etc/eiou/
      - eiou-index:/var/www/html
      - eiou-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

networks:
  eiou-network-compose:
    driver: bridge
    name: eiou-network-compose

volumes:
  eiou-mysql-data:
    name: eiou-mysql-data
  eiou-files:
    name: eiou-files
  eiou-index:
    name: eiou-index
  eiou-eiou:
    name: eiou-eiou