services:
  alice:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: alice
    networks:
      - eiou-network-compose
    ports:
      - "80:80"
      - "443:443"
    environment:
      - QUICKSTART=alice
      # SSL Configuration (optional):
      # - SSL_DOMAIN=alice.example.com     # Override certificate CN
      # - SSL_EXTRA_SANS=DNS:alice.local   # Additional SANs
    # For CA-signed certificates across all nodes, uncomment:
    # volumes (add to existing):
    #   - ./ssl-ca:/ssl-ca:ro
    volumes:
      - alice-mysql-data:/var/lib/mysql
      - alice-files:/etc/eiou/
      - alice-index:/var/www/html
      - alice-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  bob:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: bob
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=bob
    volumes:
      - bob-mysql-data:/var/lib/mysql
      - bob-files:/etc/eiou/
      - bob-index:/var/www/html
      - bob-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  carol:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: carol
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=carol
    volumes:
      - carol-mysql-data:/var/lib/mysql
      - carol-files:/etc/eiou/
      - carol-index:/var/www/html
      - carol-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  daniel:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: daniel
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=daniel
    volumes:
      - daniel-mysql-data:/var/lib/mysql
      - daniel-files:/etc/eiou/
      - daniel-index:/var/www/html
      - daniel-eiou:/usr/local/bin/
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

networks:
  eiou-network-compose:
    driver: bridge
    name: eiou-network-compose

volumes:
  alice-mysql-data:
    name: alice-mysql-data
  alice-files:
    name: alice-files
  alice-index:
    name: alice-index
  alice-eiou:
    name: alice-eiou

  bob-mysql-data:
    name: bob-mysql-data
  bob-files:
    name: bob-files
  bob-index:
    name: bob-index
  bob-eiou:
    name: bob-eiou

  carol-mysql-data:
    name: carol-mysql-data
  carol-files:
    name: carol-files
  carol-index:
    name: carol-index
  carol-eiou:
    name: carol-eiou

  daniel-mysql-data:
    name: daniel-mysql-data
  daniel-files:
    name: daniel-files
  daniel-index:
    name: daniel-index
  daniel-eiou:
    name: daniel-eiou
