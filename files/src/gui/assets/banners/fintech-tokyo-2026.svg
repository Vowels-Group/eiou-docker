<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 90" width="600" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="90" fill="url(#bg)"/>

  <!-- Accent line bottom -->
  <line x1="0" y1="88" x2="600" y2="88" stroke="url(#accent)" stroke-width="2"/>

  <!-- Centered torii gate mark -->
  <g transform="translate(289, 4) scale(1.5)" opacity="0.8">
    <rect x="0" y="0" width="16" height="2" rx="1" fill="#e94560"/>
    <rect x="-2" y="3" width="20" height="1.5" rx="0.5" fill="#e94560"/>
    <rect x="2" y="4.5" width="2" height="8" fill="#e94560"/>
    <rect x="12" y="4.5" width="2" height="8" fill="#e94560"/>
  </g>

  <!-- Main title -->
  <text x="300" y="40" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="2">FINTECH TOKYO 2026</text>

  <!-- Decorative line under title -->
  <line x1="230" y1="47" x2="370" y2="47" stroke="#e94560" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="300" y="60" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#adb5bd" letter-spacing="1.5">eIOU WALLET</text>

  <!-- Alpha badge -->
  <rect x="252" y="67" width="46" height="16" rx="3" fill="url(#accent)"/>
  <text x="275" y="78" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="8" font-weight="700" fill="white" letter-spacing="1.5">ALPHA</text>

  <!-- Version pill -->
  <rect x="304" y="67" width="40" height="16" rx="3" fill="none" stroke="#adb5bd" stroke-width="1" opacity="0.4"/>
  <text x="324" y="78" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="8" fill="#adb5bd" letter-spacing="0.5">v0.1.0</text>
</svg>
