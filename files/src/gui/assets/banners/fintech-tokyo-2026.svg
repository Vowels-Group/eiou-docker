<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="120" fill="url(#bg)"/>

  <!-- Subtle decorative lines -->
  <line x1="0" y1="118" x2="1200" y2="118" stroke="url(#accent)" stroke-width="2"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Decorative circles (Tokyo/tech motif) -->
  <circle cx="80" cy="60" r="40" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
  <circle cx="80" cy="60" r="28" fill="none" stroke="#e94560" stroke-width="1" opacity="0.1"/>
  <circle cx="1120" cy="60" r="40" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
  <circle cx="1120" cy="60" r="28" fill="none" stroke="#e94560" stroke-width="1" opacity="0.1"/>

  <!-- Small decorative dots -->
  <circle cx="160" cy="30" r="2" fill="#e94560" opacity="0.3"/>
  <circle cx="200" cy="50" r="1.5" fill="#e94560" opacity="0.2"/>
  <circle cx="1000" cy="40" r="2" fill="#e94560" opacity="0.3"/>
  <circle cx="1040" cy="70" r="1.5" fill="#e94560" opacity="0.2"/>

  <!-- Rising sun subtle reference -->
  <circle cx="600" cy="140" r="80" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.08"/>
  <circle cx="600" cy="150" r="100" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.05"/>

  <!-- Torii gate symbol (left of title) -->
  <g transform="translate(355, 22) scale(1.8)" opacity="0.85">
    <rect x="0" y="0" width="16" height="2" rx="1" fill="#e94560"/>
    <rect x="-2" y="3" width="20" height="1.5" rx="0.5" fill="#e94560"/>
    <rect x="2" y="4.5" width="2" height="12" fill="#e94560"/>
    <rect x="12" y="4.5" width="2" height="12" fill="#e94560"/>
  </g>

  <!-- Main title -->
  <text x="600" y="48" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="3">FINTECH TOKYO 2026</text>

  <!-- Torii gate symbol (right of title) -->
  <g transform="translate(803, 22) scale(1.8)" opacity="0.85">
    <rect x="0" y="0" width="16" height="2" rx="1" fill="#e94560"/>
    <rect x="-2" y="3" width="20" height="1.5" rx="0.5" fill="#e94560"/>
    <rect x="2" y="4.5" width="2" height="12" fill="#e94560"/>
    <rect x="12" y="4.5" width="2" height="12" fill="#e94560"/>
  </g>

  <!-- Subtitle -->
  <text x="600" y="72" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" fill="#adb5bd" letter-spacing="1.5">eIOU WALLET</text>

  <!-- Alpha badge -->
  <rect x="537" y="82" width="64" height="22" rx="4" fill="url(#accent)"/>
  <text x="569" y="97" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="1.5">ALPHA</text>

  <!-- Version pill -->
  <rect x="610" y="82" width="54" height="22" rx="4" fill="none" stroke="#adb5bd" stroke-width="1" opacity="0.4"/>
  <text x="637" y="97" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#adb5bd" letter-spacing="0.5">v0.1.0</text>
</svg>
