<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="500" height="130">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="130" fill="url(#bg)"/>

  <!-- Accent line bottom -->
  <line x1="0" y1="128" x2="500" y2="128" stroke="url(#accent)" stroke-width="2"/>

  <!-- Centered torii gate mark -->
  <g transform="translate(238, 8) scale(1.6)" opacity="0.8">
    <rect x="0" y="0" width="16" height="2.5" rx="1" fill="#e94560"/>
    <rect x="-2" y="4" width="20" height="2" rx="0.5" fill="#e94560"/>
    <rect x="2" y="6" width="2" height="10" fill="#e94560"/>
    <rect x="12" y="6" width="2" height="10" fill="#e94560"/>
  </g>

  <!-- Main title -->
  <text x="250" y="55" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="3">FINTECH TOKYO 2026</text>

  <!-- Decorative line under title -->
  <line x1="170" y1="64" x2="330" y2="64" stroke="#e94560" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="250" y="82" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" fill="#adb5bd" letter-spacing="2">eIOU WALLET</text>

  <!-- Alpha badge -->
  <rect x="196" y="93" width="56" height="22" rx="4" fill="url(#accent)"/>
  <text x="224" y="108" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">ALPHA</text>

  <!-- Version pill -->
  <rect x="260" y="93" width="48" height="22" rx="4" fill="none" stroke="#adb5bd" stroke-width="1" opacity="0.4"/>
  <text x="284" y="108" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#adb5bd" letter-spacing="0.5">v0.1.0</text>
</svg>
