<!-- Alpha Warning & Legal Notice — displayed below the login form.
     Legal notice text is loaded from /app/scripts/legal-notice.txt (same file
     used by the container startup banner), so a single edit updates both. -->
<div class="login-notice">
    <div class="alpha-warning">
        <strong>&#9888; Alpha/Staging Version</strong>
        <p>Do not use for real financial transactions. All data may be reset without notice.</p>

    <?php
    $noticeFile = '/app/scripts/legal-notice.txt';
    if (file_exists($noticeFile)):
        $noticeLines = explode("\n", trim(file_get_contents($noticeFile)));
        $noticeTitle = htmlspecialchars(trim($noticeLines[0]));
        // Body starts after the title and any blank lines following it
        $i = 1;
        while ($i < count($noticeLines) && trim($noticeLines[$i]) === '') { $i++; }
        $noticeBody = htmlspecialchars(trim(implode("\n", array_slice($noticeLines, $i))));
    ?>
    <details class="legal-notice">
        <summary><?php echo $noticeTitle; ?></summary>
        <div class="legal-notice-body"><?php echo $noticeBody; ?></div>
    </details>
    <?php endif; ?>
</div>
