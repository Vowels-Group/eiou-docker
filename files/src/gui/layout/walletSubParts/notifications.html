<!-- Message alerts -->
<?php if (!empty($messageForDisplay)): ?>
    <div class="alert alert-<?php echo $messageTypeForDisplay; ?> fade-in-up">
        <i class="fas fa-<?php 
            if ($messageTypeForDisplay === 'contact-accepted') {
                echo 'user-check';
            } elseif ($messageTypeForDisplay === 'success') {
                echo 'check-circle';
            } elseif ($messageTypeForDisplay === 'error') {

            } elseif ($messageTypeForDisplay === 'warning') {
                echo 'exclamation-triangle';
            } else {
                echo 'info-circle';
            }
        ?>"></i>
        <?php echo htmlspecialchars($messageForDisplay); ?>
    </div>
