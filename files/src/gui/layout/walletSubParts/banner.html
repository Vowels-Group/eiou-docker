<!-- Banner Display — loads images from /gui/assets/banners/ -->
<?php
$bannerDir = '/app/eiou/src/gui/assets/banners';
$bannerExtensions = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp'];
$banners = [];

if (is_dir($bannerDir)) {
    $files = scandir($bannerDir);
    foreach ($files as $file) {
        if ($file === '.' || $file === '..' || $file[0] === '.') {
            continue;
        }
        $ext = strtolower(pathinfo($file, PATHINFO_EXTENSION));
        if (in_array($ext, $bannerExtensions, true)) {
            $banners[] = $file;
        }
    }
    sort($banners);
}

if (!empty($banners)):
?>
<div class="banner-container">
    <?php foreach ($banners as $banner):
        $ext = strtolower(pathinfo($banner, PATHINFO_EXTENSION));
        if ($ext === 'svg'):
            // Inline SVGs so we can inject dynamic values from Constants
            $svgContent = file_get_contents($bannerDir . '/' . $banner);
            // Replace {{APP_VERSION}} with version from Constants (e.g. "0.1.10-alpha" → "v0.1.10")
            $version = 'v' . preg_replace('/-(alpha|beta|rc\d*)$/i', '', \Eiou\Core\Constants::APP_VERSION);
            $svgContent = str_replace('{{APP_VERSION}}', htmlspecialchars($version), $svgContent);
            echo '<div class="banner-image">' . $svgContent . '</div>';
        else: ?>
        <img src="/gui/assets/banners/<?php echo htmlspecialchars($banner); ?>" alt="Banner" class="banner-image">
    <?php endif; endforeach; ?>
</div>
<?php endif; ?>
