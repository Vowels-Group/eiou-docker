<!-- Banner Display — loads images from /gui/assets/banners/ -->
<?php $banners = getBanners(); if (!empty($banners)): ?>
<div class="banner-container">
    <?php foreach ($banners as $banner):
        $ext = strtolower(pathinfo($banner, PATHINFO_EXTENSION));
        if ($ext === 'svg'):
            // Inline SVGs so we can inject dynamic values from Constants
            $svgContent = file_get_contents('/app/eiou/src/gui/assets/banners/' . $banner);
            // Replace {{APP_VERSION}} with version from Constants (e.g. "0.1.11-alpha" → "v0.1.11")
            $svgContent = str_replace('{{APP_VERSION}}', htmlspecialchars(appVersionDisplay()), $svgContent);
            echo '<div class="banner-image">' . $svgContent . '</div>';
        else: ?>
        <img src="/gui/assets/banners/<?php echo htmlspecialchars($banner); ?>" alt="Banner" class="banner-image">
    <?php endif; endforeach; ?>
</div>
<?php endif; ?>
