<!-- Add Contact Form -->
<div id="add-contact" class="form-container fade-in-up">
    <h2><i class="fas fa-user-plus"></i> Add New Contact</h2>
    <form method="POST" id="addContactForm" onsubmit="return validateAddContactForm()">
        <input type="hidden" name="action" value="addContact">
        <input type="hidden" name="csrf_token" value="<?php echo htmlspecialchars($csrfToken); ?>">
        
        <div class="form-group">
            <label for="http_address"><i class="fas fa-globe"></i> HTTP Address:</label>
            <input type="text" id="http_address" name="http_address" placeholder="e.g., http://example.com">
            <small style="color: #6c757d; margin-top: 0.25rem; display: block;">
                <i class="fas fa-info-circle"></i>
                Standard web address (optional if Tor provided)
            </small>
        </div>
        <div class="form-group">
            <label for="tor_address"><i class="fas fa-user-secret"></i> Tor Address:</label>
            <input type="text" id="tor_address" name="tor_address" placeholder="e.g., exampleaddress.onion">
            <small style="color: #6c757d; margin-top: 0.25rem; display: block;">
                <i class="fas fa-info-circle"></i>
                Tor hidden service address (optional if HTTP provided)
            </small>
        </div>
        <small style="color: #dc3545; margin-top: -0.5rem; margin-bottom: 1rem; display: block;">
            <i class="fas fa-exclamation-circle"></i>
            At least one address (HTTP or Tor) is required
        </small>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter contact name" required>
        </div>
        <div class="form-group">
            <label for="fee">Fee (%):</label>
            <input type="number" id="fee" name="fee" value="<?php echo htmlspecialchars($user->getDefaultFee()); ?>" step="0.1" min="0" required class="default-value">
            <small style="color: #6c757d; margin-top: 0.25rem; display: block;">
                <i class="fas fa-info-circle"></i>
                Default value from your wallet settings
            </small>
        </div>
        <div class="form-group">
            <label for="credit">Credit Limit:</label>
            <input type="number" id="credit" name="credit" value="<?php echo htmlspecialchars($user->getDefaultCreditLimit()); ?>" min="0" required class="default-value">
            <small style="color: #6c757d; margin-top: 0.25rem; display: block;">
                <i class="fas fa-info-circle"></i>
                Default value from your wallet settings
            </small>
        </div>
        <div class="form-group">
            <label for="contactCurrency">Currency:</label>
            <select id="contactCurrency" name="currency" required>
                <option value="USD">USD</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Add Contact</button>
        </div>
    </form>
</div>

<script>
function validateAddContactForm() {
    var httpAddress = document.getElementById('http_address').value.trim();
    var torAddress = document.getElementById('tor_address').value.trim();

    if (!httpAddress && !torAddress) {
        alert('At least one address (HTTP or Tor) is required');
        return false;
    }

    // Basic HTTP address validation
    if (httpAddress && !httpAddress.match(/^https?:\/\/.+/i)) {
        alert('HTTP address must start with http:// or https://');
        return false;
    }

    // Basic Tor address validation
    if (torAddress && !torAddress.match(/\.onion$/i)) {
        alert('Tor address must end with .onion');
        return false;
    }

    return true;
}
</script>
