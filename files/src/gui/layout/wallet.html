        // Address-type display map — keys come from the live schema via
        // AddressRepository::getAllAddressTypes(), values from the Constants
        // registry with a fa-question fallback for any column the registry
        // hasn't been taught about yet. Consumed by renderContactModal and
        // any other address-iterating JS so a new transport column flows
        // through with no per-call-site change required.
        $_addrRepo = $serviceContainer->getRepositoryFactory()->get(\Eiou\Database\AddressRepository::class);
        $_addrTypes = $_addrRepo->getAllAddressTypes();
        $_addrDisplayMap = [];
        foreach ($_addrTypes as $_t) {
            $_addrDisplayMap[$_t] = \Eiou\Core\Constants::getAddressTypeDisplay($_t);
        }
    ?>
    var EIOU_ADDRESS_TYPE_DISPLAY = <?php echo json_encode($_addrDisplayMap, JSON_HEX_TAG | JSON_HEX_APOS | JSON_HEX_QUOT | JSON_HEX_AMP); ?>;</script>
