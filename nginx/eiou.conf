# =============================================================================
# eIOU Node - nginx Server Configuration
# =============================================================================
# Handles HTTP/HTTPS termination, SSL, and request routing to PHP-FPM.
#
# Rate Limiting Zones (defined in nginx.conf http block):
#   general — 30 requests/second per IP (GUI, static files)
#   api     — 10 requests/second per IP (REST API)
#   p2p     — 20 requests/second per IP (P2P transport endpoint)
#
# Connection Limits:
#   50 concurrent connections per IP address
#
# Server Blocks:
#   HTTP  (port 80)  — .onion content + /eiou P2P; HTTPS redirect for others
#   HTTPS (port 443) — SSL-terminated content serving
# =============================================================================

# --- HTTP Server Block ---
# Serves content for .onion hosts (Tor is already encrypted; port 443 is not
# mapped through the hidden service). Non-.onion requests are redirected to
# HTTPS, except the /eiou P2P transport endpoint for backward compatibility.
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Use relative Location headers for internal redirects so the
    # client's original host AND port are preserved when nodes are
    # published on a non-default external port. Same reasoning as
    # the HTTPS block below; needed here for redirects like the
    # `location = /` → `/gui/` that the HTTP path also serves
    # (loopback / .onion / /eiou exemptions skip the HTTPS redirect).
    absolute_redirect off;

    # Connection and rate limiting
    limit_conn addr 50;
    limit_req zone=general burst=50 nodelay;

    # Timeouts — drop slow/abusive connections
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;

    # Maximum request body size (P2P messages, API requests)
    client_max_body_size 10m;

    # --- Security Headers ---
    # Prevent clickjacking — deny all framing
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Control referrer information sent to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP→HTTPS redirect for non-.onion, non-loopback hosts.
    # Exceptions:
    #   - .onion hosts: Tor hidden services are already end-to-end encrypted;
    #     HTTPS is unnecessary and port 443 is not mapped through the hidden service
    #   - localhost / 127.0.0.1 / ::1: the connection never leaves the host, so
    #     there's no MITM to protect against. Forcing HTTPS just funnels the
    #     operator through a self-signed-cert warning every page load (browsers
    #     can't validate a cert for `localhost`). Browsers already treat
    #     HTTP-on-loopback as a secure context — secure-context-only Web APIs
    #     and SameSite cookie semantics work over plain HTTP here.
    #   - /eiou endpoint: P2P backward compatibility (nodes may still use HTTP)
    set $do_redirect "";
    if ($host !~* \.onion$) {
        set $do_redirect "yes";
    }
    if ($host ~* "^(localhost|127\.0\.0\.1|\[?::1\]?)$") {
        set $do_redirect "";
    }
    if ($request_uri ~* ^/eiou) {
        set $do_redirect "";
    }
    # Plugin sandbox gateway + per-plugin __dispatch endpoints (Phase 4/5
    # of plugin sandboxing). Reached only over 127.0.0.1 from sandboxed
    # FPM pools — TLS would just be self-signed-cert overhead with no
    # security gain over loopback. See docs/PLUGIN_SANDBOXING.md.
    if ($request_uri ~* ^/__plugin_gateway) {
        set $do_redirect "";
    }
    if ($request_uri ~* ^/gui/plugin/) {
        set $do_redirect "";
    }
    # The HTTPS port placeholder below is rewritten by startup.sh to
    # either an empty string (when the operator's HTTPS port is the
    # default 443) or a `:<port>` suffix (e.g. `:8443`) when EIOU_PORT
    # is set. nginx's $host variable drops the port from the Host
    # header, so without this substitution a node published on
    # `-p 8443:443` would emit `Location: https://<host>/...` and the
    # browser would hit port 443 — which isn't mapped through.
    # Cross-scheme redirects have to be absolute, so the
    # absolute_redirect-off trick used for same-scheme redirects
    # elsewhere doesn't apply here.
    if ($do_redirect = "yes") {
        return 301 https://$host__EIOU_HTTPS_PORT_SUFFIX__$request_uri;
    }

    include /etc/nginx/eiou-locations.conf;
}

# --- HTTPS Server Block ---
server {
    listen 443 ssl;
    server_name _;
    root /var/www/html;
    index index.html;

    # Use relative Location headers for internal redirects (e.g.
    # `return 302 /gui/` below). With nginx's default
    # `absolute_redirect on`, the Location is rewritten to an
    # absolute URL using the *internal* listening port (443) — which
    # strips the original client port when nodes are bound to a non-
    # default external port (e.g. localhost:8443 for a second node in
    # a multi-node setup). Relative redirects let the browser/client
    # resolve the Location against its original request URL,
    # preserving the host AND port.
    absolute_redirect off;

    # SSL/TLS configuration
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Redirect plain HTTP requests that land on the SSL port
    # (e.g. browser visiting http://localhost:8443 because Docker Desktop's
    # port-mapping link defaults to the http:// scheme regardless of which
    # port is the TLS one). $http_host is the raw Host header value
    # including whatever port the client typed — and since the client
    # already typed the right port to reach this HTTPS listener at all,
    # echoing it back with the scheme upgraded lands on the same port.
    # No env-var lookup needed here (the HTTP→HTTPS cross-scheme case in
    # the port-80 block still needs __EIOU_HTTPS_PORT_SUFFIX__ because
    # its client used the HTTP port, which is different from the HTTPS
    # port we want to redirect to).
    error_page 497 =301 https://$http_host$request_uri;


    # --- Security Headers ---
    # HSTS — enforce HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Prevent clickjacking — deny all framing (eIOU GUI is not designed to be embedded)
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME-type sniffing — browsers must respect the declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;
    # Control referrer information sent to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Connection and rate limiting
    limit_conn addr 50;
    limit_req zone=general burst=50 nodelay;

    # Timeouts — drop slow/abusive connections
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;

    # Maximum request body size
    client_max_body_size 10m;

    include /etc/nginx/eiou-locations.conf;
}
