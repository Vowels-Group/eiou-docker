# =============================================================================
# eIOU Node - Shared Location Blocks
# =============================================================================
# Included by both HTTP and HTTPS server blocks in eiou.conf.
# =============================================================================

# Redirect root to GUI dashboard
location = / {
    return 302 /gui/;
}

# GUI assets (static files — served directly with caching, no PHP)
location /gui/assets/ {
    alias /app/eiou/src/gui/assets/;
    expires 1h;
    access_log off;
}

# Plugin assets — served by PHP so the host can validate the plugin
# id + path against the installed manifest before reading from disk.
# Cache headers are set inside PHP based on the content hash in the
# `?v=…` querystring. nginx forwards every match to one PHP entry
# point (plugin-assets.php) so plugins can't access PHP directly under
# their own path. See docs/PLUGIN_GUI_HOOKS.md.
location ~ ^/gui/plugin-assets/ {
    fastcgi_pass unix:/run/php/php-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /app/eiou/src/gui/plugin-assets.php;
    fastcgi_param SCRIPT_NAME /gui/plugin-assets.php;
    fastcgi_read_timeout 30s;
}

# Per-plugin sandboxed routes. Generated by
# Eiou\Services\PluginNginxConfigService when a sandboxed plugin
# enables/disables; the supervisor in startup.sh writes the file after
# nginx -t verifies the result. Empty (header-only) when no sandboxed
# plugin is enabled. See docs/PLUGIN_SANDBOXING.md (Phase 2).
include /etc/nginx/snippets/eiou-plugins.conf;

# Plugin sandbox service gateway (Phase 4). Sandboxed plugins POST to
# this endpoint from inside their FPM pool to reach a whitelisted
# subset of core services. The endpoint runs in the wallet's www-data
# pool so the wallet has full access — but only after
# PluginGatewayController validates the per-plugin bearer token + the
# plugin's manifest core_services allow-list. See
# docs/PLUGIN_SANDBOXING.md.
location = /__plugin_gateway {
    fastcgi_pass unix:/run/php/php-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /app/eiou/src/gui/plugin-gateway.php;
    fastcgi_param SCRIPT_NAME /__plugin_gateway;
    fastcgi_read_timeout 10s;
}

# REST API routing
# Non-file requests rewrite to the API entry point (index.php).
# The original REQUEST_URI is preserved for PHP routing via fastcgi_params.
location /api/ {
    limit_req zone=api burst=20 nodelay;
    try_files $uri /api/index.php?$args;
}

# P2P transport endpoint
# Separate rate limit zone from GUI/API traffic.
location /eiou/ {
    limit_req zone=p2p burst=30 nodelay;
    index index.html;

    location ~ \.(php|html)$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 180s;
    }
}

# PHP processing for .php and .html files
# .html files contain embedded PHP (GUI entry point, P2P endpoint).
# This is the equivalent of Apache's "AddType application/x-httpd-php .html".
# 180s timeout covers approve-payment (sendEiou over Tor) and other slow operations.
location ~ \.(php|html)$ {
    try_files $uri =404;
    fastcgi_pass unix:/run/php/php-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_read_timeout 180s;
}

# Deny access to hidden files (.git, .env, .htaccess, etc.)
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Catch-all for other requests (directory index, static files)
location / {
    try_files $uri $uri/ =404;
}

# Disable directory listing
autoindex off;
