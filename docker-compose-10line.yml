services:
  node-a:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: node-a
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=node-a
    volumes:
      - node-a-mysql-data:/var/lib/mysql
      - node-a-files:/etc/eiou/
      - node-a-index:/var/www/html
      - node-a-eiou:/usr/local/bin/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

