version: '3.8'

services:
  node-a:
    build:
      context: .
      dockerfile: eioud.dockerfile
    container_name: node-a
    networks:
      - eiou-network-compose
    environment:
      - QUICKSTART=node-a
    volumes:
      - node-a-mysql-data:/var/lib/mysql
    restart: unless-stopped

